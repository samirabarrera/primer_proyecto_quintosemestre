version: '3.8'
services:
  db:
    image: postgres:15
    container_name: Proyecto_Uno
    restart: unless-stopped
    environment:
      POSTGRES_USER: samira-proyecto1
      POSTGRES_PASSWORD: "samira1234"
      POSTGRES_DB: ProyectoI_Semestre5
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: