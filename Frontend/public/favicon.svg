<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo redondeado rosado -->
  <rect width="32" height="32" rx="6" fill="#e91e8c"/>

  <!-- Cuerpo del ticket -->
  <rect x="4" y="9" width="24" height="14" rx="2" fill="#ffffff"/>

  <!-- Muesca izquierda del ticket -->
  <circle cx="4" cy="16" r="2.5" fill="#e91e8c"/>

  <!-- Muesca derecha del ticket -->
  <circle cx="28" cy="16" r="2.5" fill="#e91e8c"/>

  <!-- Línea punteada central -->
  <line x1="11" y1="16" x2="21" y2="16" stroke="#e91e8c" stroke-width="1" stroke-dasharray="1.5 1.5"/>

  <!-- Checkmark -->
  <polyline points="12,13 15,16 20,11" stroke="#e91e8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
